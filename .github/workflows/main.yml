name: Java CI

on: [push, pull_request, workflow_dispatch]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract-version.outputs.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Extract version number
        id: extract-version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Cache Lucee files
        uses: actions/cache@v4
        with:
          path: ~/work/_actions/lucee/script-runner/main/lucee-download-cache
          key: lucee-downloads

  build-and-test:
    runs-on: ubuntu-latest
    needs: setup
    env:
      LUCEE_TEST_VERSIONS_7: ${{ vars.LUCEE_TEST_VERSIONS_7 }}
    strategy:
      fail-fast: false
      matrix:
        lucee: ${{ fromJSON(vars.LUCEE_TEST_VERSIONS_7) }}
    services:
      samba:
        image: dperson/samba
        ports:
          - 139:139
          - 445:445
        env:
          USER: "smbuser;smbpass"
          SHARE: "public;/share;yes;no;no;all"
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and Install with Maven
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "------- Maven Install -------";
          mvn -B -e -f pom.xml clean install -Dgoal=install

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smb-lex-${{ replace(matrix.lucee.query, '/', '-') }}
          path: target/*.lex

      - name: Wait for Samba to be ready
        run: |
          echo "Waiting for Samba to start..."
          for i in {1..30}; do
            if nc -z localhost 445 2>/dev/null; then
              echo "Samba port 445 is open!"
              sleep 5
              break
            fi
            echo "Attempt $i: Samba not ready yet, waiting..."
            sleep 2
          done

      - name: Fix Samba share permissions
        run: |
          docker ps
          CONTAINER_ID=$(docker ps -q --filter "ancestor=dperson/samba")
          echo "Samba container: $CONTAINER_ID"
          docker exec $CONTAINER_ID sh -c 'chown 1000:1000 /share && chmod 777 /share'
          echo "Permissions fixed"

      - name: Checkout Lucee
        uses: actions/checkout@v4
        with:
          repository: lucee/lucee
          path: lucee
          ref: ${{ matrix.lucee.branch }}

      - name: Run Lucee Test Suite
        uses: lucee/script-runner@main
        with:
          webroot: ${{ github.workspace }}/lucee/test
          execute: /bootstrap-tests.cfm
          luceeVersion: ${{ matrix.lucee.version }}
          luceeVersionQuery: ${{ matrix.lucee.query }}
          extensionDir: ${{ github.workspace }}/target
        env:
          testLabels: smb
          testAdditional: ${{ github.workspace }}/tests

  deploy:
    runs-on: ubuntu-latest
    needs: [setup, build-and-test]
    if: always() && needs.build-and-test.result == 'success'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Import GPG key
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Build and Deploy with Maven
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [[ "${{ needs.setup.outputs.version }}" == *-SNAPSHOT ]]; then
            echo "------- Maven Deploy snapshot on ${{ github.event_name }} -------";
            mvn -B -e -f pom.xml clean deploy -Dgoal=deploy -DperformRelease=true --settings maven-settings.xml
          elif [[ "${{ needs.setup.outputs.version }}" == *-ALPHA ]]; then
            echo "------- Maven Install alpha on ${{ github.event_name }} -------";
            mvn -B -e -f pom.xml clean install -Dgoal=install --settings maven-settings.xml
          else
            echo "------- Maven Deploy release on ${{ github.event_name }} -------";
            mvn -B -e -f pom.xml clean deploy -Dgoal=deploy -DperformRelease=true --settings maven-settings.xml
          fi
